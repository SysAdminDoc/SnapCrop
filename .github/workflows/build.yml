name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test, and assemble
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Verify app
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease

      - name: Upload lint and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SnapCrop-verification-reports
          path: |
            app/build/reports/lint-results-debug.*
            app/build/reports/tests/testDebugUnitTest/**
            app/build/test-results/testDebugUnitTest/**

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5

  release-artifacts:
    name: Release APK and SBOM
    runs-on: ubuntu-latest
    needs:
      - verify
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build release APK and SBOM
        run: ./gradlew :app:assembleRelease :app:cyclonedxDirectBom

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SnapCrop-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: SnapCrop-cyclonedx-sbom
          path: app/build/reports/cyclonedx-direct/bom.*
