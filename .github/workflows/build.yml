name: Android CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  release:
    types:
      - published

permissions:
  contents: read

jobs:
  verify:
    name: Lint, test, and assemble
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: aCropalypse regression guard
        run: |
          # CVE-2023-21036: writing shorter data to an existing file without truncation leaks
          # trailing bytes from the original. All SnapCrop saves use freshly insert()-ed MediaStore
          # URIs (safe). Fail CI if any future code opens an existing URI with "rw" or explicit "w"
          # mode — the safe alternatives are the default openOutputStream(uri) on a new URI, or "wt".
          if grep -rn --include='*.kt' --include='*.java' -E 'open(OutputStream|FileDescriptor)\([^)]*"rw?"[^t]' app/src/main; then
            echo "::error::Detected openOutputStream/openFileDescriptor with non-truncating write mode. Use insert()+default mode or \"wt\" to prevent aCropalypse trailing-byte leaks."
            exit 1
          fi

      - name: Verify app
        run: ./gradlew :app:lintDebug :app:testDebugUnitTest :app:assembleDebug :app:assembleRelease

      - name: Upload lint and test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: SnapCrop-verification-reports
          path: |
            app/build/reports/lint-results-debug.*
            app/build/reports/tests/testDebugUnitTest/**
            app/build/test-results/testDebugUnitTest/**

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v5

  release-artifacts:
    name: Release APK and SBOM
    runs-on: ubuntu-latest
    needs:
      - verify
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'release'
    permissions:
      contents: write   # required to attach the signed APK to the GitHub Release

    # Configure these repository secrets to produce a release-key-signed APK that can update an
    # existing install. Without them the build falls back to debug signing (artifact only, never
    # attached to a Release). SNAPCROP_KEYSTORE_BASE64 = `base64 -w0 snapcrop-release.jks`.
    env:
      SNAPCROP_KEYSTORE_BASE64: ${{ secrets.SNAPCROP_KEYSTORE_BASE64 }}
      SNAPCROP_KEYSTORE_PASSWORD: ${{ secrets.SNAPCROP_KEYSTORE_PASSWORD }}
      SNAPCROP_KEY_ALIAS: ${{ secrets.SNAPCROP_KEY_ALIAS }}
      SNAPCROP_KEY_PASSWORD: ${{ secrets.SNAPCROP_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode release keystore
        if: ${{ env.SNAPCROP_KEYSTORE_BASE64 != '' }}
        run: echo "$SNAPCROP_KEYSTORE_BASE64" | base64 -d > snapcrop-release.jks

      - name: Build release APK and SBOM
        run: ./gradlew :app:assembleRelease :app:cyclonedxDirectBom

      - name: Verify APK signature
        if: ${{ env.SNAPCROP_KEYSTORE_BASE64 != '' }}
        run: |
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          APKSIGNER=$(ls "$ANDROID_SDK_ROOT"/build-tools/*/apksigner | sort -V | tail -1)
          "$APKSIGNER" verify --print-certs "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SnapCrop-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: SnapCrop-cyclonedx-sbom
          path: app/build/reports/cyclonedx-direct/bom.*

      - name: Attach signed APK to the GitHub Release
        if: ${{ github.event_name == 'release' && env.SNAPCROP_KEYSTORE_BASE64 != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.event.release.tag_name }}"
          APK=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$APK" "SnapCrop-${TAG}.apk"
          gh release upload "$TAG" "SnapCrop-${TAG}.apk" --clobber

      - name: Clean up keystore
        if: ${{ always() }}
        run: rm -f snapcrop-release.jks
